        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .option-btn { transition: all 0.2s; border-width: 2px; }
        .option-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .option-wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .num-dot { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 10px; font-weight: 80; transition: all 0.2s; cursor: pointer; flex-shrink: 0; }
        .dot-unfilled { background-color: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
        .dot-correct { background-color: #22c55e; color: white; border-color: #22c55e; }
        .dot-wrong { background-color: #ef4444; color: white; border-color: #ef4444; }
        .dot-active { border: 2px solid #6366f1; transform: scale(1.1); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen pb-32">

        <div>

            <div class="relative">
                <button onclick="toggleDropdown(event)" class="flex items-center gap-2 text-xl font-extrabold text-slate-900">
                    <span id="currentPartTitle">Bagian 1</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>

                    <div class="p-2 max-h-80 overflow-y-auto" id="dropdownList"></div>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <div class="flex items-center gap-1.5 bg-red-50 px-3 py-1.5 rounded-xl border border-red-100">

    <main class="w-full max-w-md px-6 mt-6" onclick="closeDropdown()">

        <div class="bg-white rounded-[3rem] shadow-xl shadow-slate-200/40 border border-white p-14 flex flex-col items-center mb-8">
            <div id="kanjiQuestion" class="text-5xl font-extrabold text-slate-900">?</div>
            <div id="statusBadge" class="mt-8 px-5 py-1.5 rounded-full bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest">Belum Diisi</div>
        </div>

        <div id="optionsContainer" class="space-y-3"></div>

        <div id="explanationArea" class="hidden mt-8 p-8 bg-slate-900 rounded-[2.5rem] text-white mb-10">
            <p id="explanationText" class="text-sm text-slate-300 leading-relaxed font-medium"></p>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-xl border-t border-slate-100 px-6 py-5 flex justify-between items-center gap-4 z-40">

function initDropdown() {
    const list = document.getElementById('dropdownList');
    list.innerHTML = '';
    for(let i=1; i<=14; i++) {
        const btn = document.createElement('button');
        const isActive = (i === currentPart);
        btn.className = `w-full text-left px-5 py-4 text-xs font-bold border-b border-slate-50 transition-colors ${isActive ? 'bg-indigo-50 text-indigo-600' : 'text-slate-500 hover:bg-slate-50'}`;
        btn.innerHTML = `<div class="flex justify-between"><span>Bagian ${i}</span>${isActive ? '<span>●</span>' : ''}</div>`;
        btn.onclick = () => {
            currentPart = i;
            document.getElementById('currentPartTitle').innerText = "Bagian " + i;
            initDropdown(); 
            closeDropdown();
            restartGame();
        };
        list.appendChild(btn);
    }
}

function toggleDropdown(e) { 
    e.stopPropagation(); 
    document.getElementById('partDropdown').classList.toggle('hidden'); 
}

function closeDropdown() { 
    document.getElementById('partDropdown').classList.add('hidden'); 
}

function renderNumberGrid() {
    const grid = document.getElementById('numberGrid');
    grid.innerHTML = '';
    for(let i=0; i<35; i++) {
        const dot = document.createElement('div');
        let sc = userAnswers[i] === 'correct' ? 'dot-correct' : 
                 (userAnswers[i] === 'wrong' ? 'dot-wrong' : 'dot-unfilled');
        dot.className = `num-dot ${sc} ${i === currentIndex ? 'dot-active' : ''}`;
        dot.innerText = i + 1;
        dot.onclick = () => { 
            currentIndex = i; 
            loadQuestion(true); 
        };
        grid.appendChild(dot);
    }
}

function restartGame() {
    quizData = [...allData[currentPart]];
    currentIndex = 0; 
    lives = 20; 
    score = 0;
    wrongCount = 0;
    userAnswers = new Array(35).fill(null);
    document.getElementById('livesText').innerText = lives;
    loadQuestion(true);
}

function loadQuestion(isNew) {
    renderNumberGrid();
    const item = quizData[currentIndex];

    if(isNew) {
        let opts = [{ r: item.r, m: item.m, correct: true }];
        let others = quizData.filter(i => i.r !== item.r)
                             .sort(() => Math.random() - 0.5);

        for(let i=0; i<3; i++) { 
            if(others[i]) 
                opts.push({ r: others[i].r, m: others[i].m, correct: false }); 
        }

        currentOptions = opts.sort(() => Math.random() - 0.5);
        document.getElementById('kanjiQuestion').innerText = item.k;
    }
            
    const badge = document.getElementById('statusBadge');
    const exp = document.getElementById('explanationArea');

    if(userAnswers[currentIndex] === null) {
        badge.innerText = "Belum Diisi";
        badge.className = "mt-8 px-5 py-1.5 rounded-full bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest";
        exp.classList.add('hidden');
    } else {
        const isC = userAnswers[currentIndex] === 'correct';
        badge.innerText = isC ? "Benar" : "Salah";
        badge.className = `mt-8 px-5 py-1.5 rounded-full ${isC ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} text-[9px] font-black uppercase tracking-widest`;
        document.getElementById('explanationText').innerText = item.e;
        exp.classList.remove('hidden');
    }

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    currentOptions.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = "option-btn w-full p-5 bg-white border-slate-100 rounded-2xl flex justify-between items-center text-left shadow-sm";

        if(userAnswers[currentIndex] !== null) {
            if(opt.correct) btn.classList.add('option-correct');
            if(userAnswers[currentIndex] === 'wrong' && opt.clicked) 
                btn.classList.add('option-wrong');
        }

        btn.innerHTML = `
            <div>
                <div class="text-sm font-black text-slate-800">${opt.r}</div>
                <div class="text-[9px] font-bold text-slate-400 uppercase">${opt.m}</div>
            </div>
        `;

        btn.onclick = () => {
            if(userAnswers[currentIndex] !== null) return;

            opt.clicked = true;

            if(opt.correct) { 
                userAnswers[currentIndex] = 'correct'; 
                score += 20; 
            } else { 
                userAnswers[currentIndex] = 'wrong'; 
                lives--; 
                wrongCount++;

                document.getElementById('livesText').innerText = lives;

                if(wrongCount >= 20){
                    alert("Sudah 20 kali salah! Quiz akan di-reset.");
                    wrongCount = 0;
                    restartGame();
                    return;
                }
            }

            loadQuestion(false);
        };

        container.appendChild(btn);
    });
}

function nextQuestion() { 
    if(currentIndex < 34) { 
        currentIndex++; 
        loadQuestion(true); 
    } 
}

function prevQuestion() { 
    if(currentIndex > 0) { 
        currentIndex--; 
        loadQuestion(true); 
    } 
}

window.onload = () => { 
    initDropdown(); 
    restartGame();
};
